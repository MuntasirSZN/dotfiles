<?xml version='1.0'?>
<!DOCTYPE fontconfig SYSTEM 'urn:fontconfig:fonts.dtd'>
<fontconfig>
 <!-- Apply text rasterization, hinting, and anti-aliasing -->
 <match target="font">
  <edit mode="assign" name="antialias">
   <bool>true</bool>
  </edit>
  <edit mode="assign" name="hinting">
   <bool>true</bool>
  </edit>
  <edit mode="assign" name="rgba">
   <const>rgb</const>
  </edit>
  <edit mode="assign" name="hintstyle">
   <const>hintslight</const>
  </edit>
  <edit mode="assign" name="lcdfilter">
   <const>lcddefault</const>
  </edit>
 </match>
 <!-- Configure default fonts & fallback fonts -->
 <!-- Replace fonts with preferred fonts -->
 <!-- Noto Color Emoji allows for emojis to render in all apps including the terminal, remove it if not needed -->
 <alias>
  <family>serif</family>
  <prefer>
   <family>Geist</family>
   <family>Noto Color Emoji</family>
  </prefer>
 </alias>
 <alias>
  <family>sans-serif</family>
  <prefer>
   <family>Geist</family>
   <family>Noto Color Emoji</family>
  </prefer>
 </alias>
 <alias>
  <family>sans</family>
  <prefer>
   <family>Geist</family>
   <family>Noto Color Emoji</family>
  </prefer>
 </alias>
 <alias>
  <family>monospace</family>
  <prefer>
   <family>Fira Code</family>
   <family>Noto Color Emoji</family>
  </prefer>
 </alias>
 <alias>
  <family>mono</family>
  <prefer>
   <family>Fira Code</family>
   <family>Noto Color Emoji</family>
  </prefer>
 </alias>
 <match target="pattern">
  <edit mode="assign" name="rgba">
   <const>vbgr</const>
  </edit>
 </match>
 <match target="pattern">
  <edit mode="assign" name="hinting">
   <bool>true</bool>
  </edit>
 </match>
 <match target="pattern">
  <edit mode="assign" name="hintstyle">
   <const>hintslight</const>
  </edit>
 </match>
 <match target="pattern">
  <edit mode="assign" name="antialias">
   <bool>true</bool>
  </edit>
 </match>
 <dir>~/.local/share/fonts</dir>
</fontconfig>
